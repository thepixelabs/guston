<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <!-- Background -->
  <rect width="520" height="200" fill="#070a14" rx="16"/>

  <!-- Radial glows -->
  <radialGradient id="glowCyan" cx="20%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#71e0ff" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#070a14" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowPurple" cx="85%" cy="30%" r="45%">
    <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#070a14" stop-opacity="0"/>
  </radialGradient>
  <rect width="520" height="200" fill="url(#glowCyan)" rx="16"/>
  <rect width="520" height="200" fill="url(#glowPurple)" rx="16"/>

  <!-- ── GUSTON MARK (centered at 88, 100) ── -->
  <g transform="translate(88, 100)">

    <!-- Outer dashed orbit ring -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#71e0ff" stroke-width="0.8"
            stroke-dasharray="3 7" stroke-opacity="0.18">
      <animateTransform attributeName="transform" type="rotate"
                        from="0 0 0" to="360 0 0" dur="18s" repeatCount="indefinite"/>
    </circle>

    <!-- Mid ring — color pulse -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#71e0ff" stroke-width="1.2">
      <animate attributeName="stroke" values="#71e0ff;#a78bfa;#5cffb1;#71e0ff" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.45;0.75;0.45" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Inner ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#71e0ff" stroke-width="0.8" stroke-opacity="0.28"/>

    <!-- Wind swirl arm 1 — dominant -->
    <path d="M0 0 Q20 -28 38 -19" fill="none" stroke-width="2.2" stroke-linecap="round">
      <animate attributeName="stroke" values="#71e0ff;#a78bfa;#5cffb1;#71e0ff" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.95;0.5;0.95" dur="1.6s" repeatCount="indefinite"/>
    </path>

    <!-- Wind swirl arm 2 -->
    <path d="M0 0 Q-28 14 -26 44" fill="none" stroke-width="2.2" stroke-linecap="round">
      <animate attributeName="stroke" values="#a78bfa;#5cffb1;#71e0ff;#a78bfa" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.95;0.5;0.95" dur="1.9s" repeatCount="indefinite"/>
    </path>

    <!-- Wind swirl arm 3 — faint -->
    <path d="M0 0 Q-18 -23 -36 -14" fill="none" stroke-width="1.5" stroke-linecap="round">
      <animate attributeName="stroke" values="#5cffb1;#71e0ff;#a78bfa;#5cffb1" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.5;0.25;0.5" dur="2.3s" repeatCount="indefinite"/>
    </path>

    <!-- North tick — butler precision marker -->
    <line x1="0" y1="-62" x2="0" y2="-53" stroke-width="2" stroke-linecap="round">
      <animate attributeName="stroke" values="#71e0ff;#a78bfa;#71e0ff" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
    </line>

    <!-- Center eye — pulsing -->
    <circle cx="0" cy="0" r="6">
      <animate attributeName="fill" values="#71e0ff;#a78bfa;#5cffb1;#71e0ff" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="5.5;7;5.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="2.5" fill="#070a14"/>

    <!-- Outer glow ring — subtle pulse -->
    <circle cx="0" cy="0" r="60" fill="none" stroke-width="8">
      <animate attributeName="stroke" values="#71e0ff;#a78bfa;#71e0ff" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0;0.06;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ── WORDMARK ── -->
  <text x="175" y="94" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif"
        font-size="52" font-weight="800" letter-spacing="8" text-anchor="start">
    GUSTON
    <animate attributeName="fill" values="#71e0ff;#a78bfa;#5cffb1;#71e0ff" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="177" y="118" font-family="ui-monospace,'JetBrains Mono',SFMono-Regular,Menlo,monospace"
        font-size="10.5" fill="#71e0ff" fill-opacity="0.45" letter-spacing="3.5" text-anchor="start">
    ISRAELI KITE &amp; SURF DASHBOARD
  </text>

  <!-- Divider -->
  <line x1="177" y1="134" x2="498" y2="134" stroke="#71e0ff" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- ── BADGE PILLS ── -->
  <!-- LIVE -->
  <rect x="177" y="146" width="46" height="20" rx="5"
        fill="rgba(92,255,177,0.08)" stroke="#5cffb1" stroke-width="0.8" stroke-opacity="0.5"/>
  <circle cx="190" cy="156" r="3" fill="#5cffb1">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="160" font-family="ui-monospace,monospace" font-size="8.5" fill="#5cffb1"
        fill-opacity="0.85" letter-spacing="1.5">LIVE</text>

  <!-- WIND -->
  <rect x="229" y="146" width="50" height="20" rx="5"
        fill="rgba(113,224,255,0.08)" stroke="#71e0ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="254" y="160" font-family="ui-monospace,monospace" font-size="8.5" fill="#71e0ff"
        fill-opacity="0.75" letter-spacing="1.5" text-anchor="middle">WIND</text>

  <!-- WAVES -->
  <rect x="285" y="146" width="56" height="20" rx="5"
        fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="313" y="160" font-family="ui-monospace,monospace" font-size="8.5" fill="#a78bfa"
        fill-opacity="0.75" letter-spacing="1.5" text-anchor="middle">WAVES</text>

  <!-- KITE -->
  <rect x="347" y="146" width="46" height="20" rx="5"
        fill="rgba(113,224,255,0.08)" stroke="#71e0ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="370" y="160" font-family="ui-monospace,monospace" font-size="8.5" fill="#71e0ff"
        fill-opacity="0.75" letter-spacing="1.5" text-anchor="middle">KITE</text>

  <!-- ISRAEL -->
  <rect x="399" y="146" width="58" height="20" rx="5"
        fill="rgba(255,209,102,0.08)" stroke="#ffd166" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="428" y="160" font-family="ui-monospace,monospace" font-size="8.5" fill="#ffd166"
        fill-opacity="0.75" letter-spacing="1.5" text-anchor="middle">ISRAEL</text>
</svg>
